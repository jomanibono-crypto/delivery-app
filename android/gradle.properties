org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
# This newDsl flag was added by the Flutter template
android.newDsl=false
# This builtInKotlin flag was added by the Flutter template
android.builtInKotlin=false

# ── Fix: Kotlin daemon incremental-cache corruption on Windows ──
# Run the Kotlin compiler in the Gradle worker process (no separate daemon),
# and disable incremental compilation. This avoids the
# "Could not close incremental caches" file-lock error.
kotlin.compiler.execution.strategy=in-process
kotlin.incremental=false
